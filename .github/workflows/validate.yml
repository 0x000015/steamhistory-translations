name: Validate Translations

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Validate JSON Syntax
        run: |
          for file in messages/*.json; do
            echo "Checking $file..."
            jq . "$file" > /dev/null || exit 1
          done

      - name: Inlang Lint
        run: |
          npx @inlang/cli@latest lint --project ./project.inlang
